<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Baseer – Android Onboarding</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #EDE8DE; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>

<script type="text/babel">
  const { useEffect } = React;

  function App() {
    return (
      <DesignCanvas title="Baseer · Onboarding flow" subtitle="Android · 6 screens · Navy #152E3E / Steel #2D6A8E / Cream #F7F5F0">
        <DCSection id="onboarding" title="Onboarding – first run">
          <DCArtboard id="s1" label="01 · Splash"        width={360} height={780}><Screen_Splash/></DCArtboard>
          <DCArtboard id="s2" label="02 · Welcome"       width={360} height={780}><Screen_Welcome/></DCArtboard>
          <DCArtboard id="s3" label="03 · Permissions"   width={360} height={780}><Screen_Permissions/></DCArtboard>
          <DCArtboard id="s4" label="04 · Voice setup"   width={360} height={780}><Screen_Voice/></DCArtboard>
          <DCArtboard id="s5" label="05 · Features"      width={360} height={780}><Screen_Features/></DCArtboard>
          <DCArtboard id="s6" label="06 · Ready / home"  width={360} height={780}><Screen_Ready/></DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  // Wait for babel scripts to attach globals
  const tryMount = () => {
    if (window.DesignCanvas && window.DCSection && window.DCArtboard &&
        window.AndroidDevice && window.Screen_Splash) {
      ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    } else {
      setTimeout(tryMount, 50);
    }
  };
  tryMount();
</script>
</body>
</html>
